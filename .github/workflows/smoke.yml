name: Smoke providers

# Test de fumée réseau des providers LiDAR : le harness tests/smoke_providers.py
# importe lidar2map et appelle SES vraies fonctions de download (discover ->
# telecharger_* -> post_fetch -> validation GeoTIFF) sur un point couvert, une
# tuile par provider. Détecte un endpoint tombé, une API qui change de format,
# une clé expirée. Lancé chaque semaine + à la demande (PAS sur push : ça
# toucherait ~30 endpoints externes à chaque déploiement).
#
# Les runners GitHub sortent par des IP cloud. es-icgc donne un faux FAIL depuis
# la CI mais marche depuis une IP normale, donc exclu via --skip :
#   es-icgc          : datacloud.icgc.cat throttle les IP cloud (timeout ~370s ;
#                      PASS en 1,6s en local).
# us-tnm peut échouer transitoirement (backend USGS/sciencebase) : un re-run
# repasse, on le garde dans le run pour ne pas perdre le signal.
#
# Clés API / comptes optionnels via secrets du repo (sinon ces providers -> SKIP
# automatique) : OPENTOPOGRAPHY_API_KEY (us-3dep), DATAFORDELER_TOKEN (dk),
# FI_NLS_API_KEY (fi), DGT_USER/DGT_PASS (pt), LANTMATERIET_USER/LANTMATERIET_PASS (se).

on:
  schedule:
    - cron: "0 6 * * 1"      # chaque lundi 06:00 UTC
  workflow_dispatch:

jobs:
  smoke:
    name: smoke providers (ubuntu)
    runs-on: ubuntu-latest
    env:
      LIDAR2MAP_BOOTSTRAP: none
      OPENTOPOGRAPHY_API_KEY: ${{ secrets.OPENTOPOGRAPHY_API_KEY }}
      DATAFORDELER_TOKEN:     ${{ secrets.DATAFORDELER_TOKEN }}
      FI_NLS_API_KEY:         ${{ secrets.FI_NLS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installer les dependances
        # Deps obligatoires de lidar2map (import) + laspy/lazrs pour le post_fetch
        # LAZ (cz/se). Pas de numba : le self-test ne calcule aucun ombrage.
        run: pip install pyproj Pillow numpy scipy ijson rasterio fiona certifi laspy lazrs

      - name: Smoke test providers
        # fr-ign-dfm exclu : son smoke téléchargerait un COPC LAZ de 205 Mo à
        # chaque run hebdo (le provider partage son WFS avec fr-reunion/
        # fr-guadeloupe, testés eux ; la conversion DFM est testée en local).
        run: python tests/smoke_providers.py --skip es-icgc,fr-ign-dfm
